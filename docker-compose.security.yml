# Overlay this on top of the base docker-compose.yml:
#   podman-compose -f docker-compose.yml -f docker-compose.security.yml up -d --build
#
# Services added:
#   ollama      — local LLM runtime (AMD ROCm / RX 6950 XT); API at :11434
#   toolchain   — Kali sidecar exposing an internal exec API on :8088
#   spiderfoot  — SpiderFoot OSINT server; MCP server talks to its REST API on port 5001
#   bentopdf    — BentoPDF client-side PDF toolkit; web UI at http://localhost:3000

services:
  # ── extend upstream odysseus with security + LLM env vars ────────────────
  odysseus:
    environment:
      # Ollama inside the compose stack
      OLLAMA_BASE_URL: "http://odysseus-ollama:11434/v1"
      LLM_HOST: "odysseus-ollama"
      # Toolchain exec API — MCP servers call this instead of podman exec
      ODYSSEUS_TOOLCHAIN_API: "http://odysseus-toolchain:8088"
      # Threat intelligence API keys (fill in .env)
      SHODAN_API_KEY: "${SHODAN_API_KEY:-}"
      VIRUSTOTAL_API_KEY: "${VIRUSTOTAL_API_KEY:-}"
      OTX_API_KEY: "${OTX_API_KEY:-}"
      NVD_API_KEY: "${NVD_API_KEY:-}"
      # SpiderFoot REST endpoint
      SPIDERFOOT_URL: "${SPIDERFOOT_URL:-http://odysseus-spiderfoot:5001}"
      SPIDERFOOT_USERNAME: "${SPIDERFOOT_USERNAME:-}"
      SPIDERFOOT_PASSWORD: "${SPIDERFOOT_PASSWORD:-}"
      # PDF / BentoPDF
      BENTOPDF_URL: "${BENTOPDF_URL:-http://localhost:3000}"
      ODYSSEUS_DATA_DIR: "${ODYSSEUS_DATA_DIR:-./data}"

  # ── Ollama local LLM runtime ──────────────────────────────────────────────
  ollama:
    # CPU image — works reliably in a container on a desktop system.
    #
    # GPU note (RX 6950 XT / Navi 21): ROCm in an isolated container fails
    # with "Memory in use" because the Wayland compositor holds GPU VA ranges
    # that ROCm's page-table walk treats as already mapped. GPU inference
    # requires running Ollama directly on the host (or inside a toolbox with
    # host namespaces). To use the host Ollama GPU instance instead, stop this
    # service and set OLLAMA_BASE_URL=http://host.docker.internal:11434/v1 in
    # the odysseus service above.
    image: docker.io/ollama/ollama:latest
    container_name: odysseus-ollama
    hostname: odysseus-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    security_opt:
      - no-new-privileges:true

  # ── Kali sidecar ──────────────────────────────────────────────────────────
  toolchain:
    build:
      context: ./docker/toolchain
      dockerfile: Dockerfile
    container_name: odysseus-toolchain
    hostname: odysseus-toolchain
    volumes:
      - toolchain-workspaces:/workspaces
      - toolchain-reports:/reports
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW      # required by nmap/masscan for raw socket scans
      - NET_ADMIN    # required for some network tooling
    security_opt:
      - no-new-privileges:true

  # ── SpiderFoot OSINT ──────────────────────────────────────────────────────
  spiderfoot:
    image: docker.io/fopina/spiderfoot:latest
    container_name: odysseus-spiderfoot
    hostname: odysseus-spiderfoot
    # Port 5001 is intentionally NOT published to the host — only MCP servers
    # on the internal network need to reach it. To access the SpiderFoot web UI
    # directly, temporarily add: ports: ["127.0.0.1:5001:5001"]
    volumes:
      - spiderfoot-data:/var/spiderfoot
    restart: unless-stopped
    environment:
      SHODAN_API_KEY: "${SHODAN_API_KEY:-}"
      VIRUSTOTAL_API_KEY: "${VIRUSTOTAL_API_KEY:-}"
      OTX_API_KEY: "${OTX_API_KEY:-}"
    security_opt:
      - no-new-privileges:true

  # ── BentoPDF ──────────────────────────────────────────────────────────────
  bentopdf:
    image: ghcr.io/alam00000/bentopdf-simple:latest
    container_name: odysseus-bentopdf
    hostname: odysseus-bentopdf
    ports:
      - "127.0.0.1:3000:8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  ollama-models:
  toolchain-workspaces:
  toolchain-reports:
  spiderfoot-data:
