name: full_recon
version: "1.0"
description: >
  Complete active reconnaissance chain for an authorized target.
  Runs port discovery, service fingerprinting, and web asset enumeration
  in sequence. Requires a confirmed authorized scope before execution.

authorization_prompt: >
  Before running: confirm you have written authorization to scan {{ target }}.
  Type AUTHORIZED to proceed.

inputs:
  target:
    type: string
    description: "IP, hostname, or CIDR range"
  url:
    type: string
    required: false
    description: "Base URL for web enumeration (e.g. http://target.com). Required when include_web is true."
  include_web:
    type: boolean
    default: true
    description: "Run web enumeration and vuln scan against the provided URL"

steps:
  - id: port_scan
    tool: nmap_scan
    args:
      target: "{{ target }}"
      flags: "-sV -T4 --open -p-"
    description: "Full port + service version scan"

  - id: web_enum
    condition: "{{ include_web and url }}"
    tool: gobuster_dir
    args:
      url: "{{ url }}"
      wordlist: "/usr/share/wordlists/dirb/common.txt"
      threads: 20
    description: "Directory enumeration on the target web service"

  - id: vuln_scan
    condition: "{{ include_web and url }}"
    tool: nuclei_scan
    args:
      url: "{{ url }}"
      severity: "critical,high,medium"
    description: "Template-based vulnerability detection"

  - id: generate_report
    tool: generate_report
    args:
      template: pentest_standard
      findings: "{{ steps }}"
    description: "Compile findings into structured Markdown report"
