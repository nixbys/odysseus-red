name: credential_breach
version: "1.0"
description: >
  Incident response playbook for a credential compromise event.
  Covers breach scope assessment, impacted service identification,
  password spray / stuffing detection, session token revocation guidance,
  and hardening recommendations including MFA enforcement.

inputs:
  compromised_usernames:
    type: list
    description: "Usernames or email addresses known or suspected to be compromised"
  source_ips:
    type: list
    required: false
    description: "Source IPs from authentication logs showing suspicious activity"
  affected_services:
    type: list
    required: false
    description: "Services or applications affected (e.g. ['vpn', 'webmail', 'gitlab'])"
  incident_id:
    type: string
    required: false
    description: "Ticket / case reference ID"

steps:
  - id: attacker_ip_intel
    tool: shodan_host
    args:
      ip: "{{ source_ips | first }}"
    description: >
      Shodan lookup on the primary source IP from auth logs.
      Identifies VPN / proxy / Tor exit nodes commonly used in credential stuffing.

  - id: otx_source_ips
    tool: otx_indicator
    args:
      indicators: "{{ source_ips }}"
    description: >
      OTX threat intelligence on source IPs — existing malicious IP lists,
      credential stuffing botnets, and associated threat actor context.

  - id: censys_source_ips
    tool: censys_host
    args:
      ip: "{{ source_ips | first }}"
    description: >
      Censys host data on primary source IP for additional infrastructure context:
      ASN, labels (tor-exit, vpn, scanner), and historical data.

  - id: vt_hashes
    tool: virustotal_lookup
    args:
      targets: "{{ source_ips }}"
    description: >
      VirusTotal IP reputation check — detection count, downloaded files
      from the IP, and related threat intelligence.

  - id: affected_service_scan
    tool: nmap_scan
    args:
      target: "{{ affected_services | join(',') }}"
      flags: "-sV --open -p 443,80,22,8080,8443"
    description: >
      Scan affected services to enumerate current exposure and identify
      any auth bypass vulnerabilities on the affected endpoints.

  - id: web_vuln_affected
    tool: nuclei_scan
    args:
      target: "{{ affected_services | first }}"
      templates: "cves,exposures,technologies"
    description: >
      Check affected services for known CVEs that may have assisted the breach
      (auth bypass, session fixation, SSRF to internal credential stores).

  - id: ttps_credential
    tool: attck_map
    args:
      technique_ids:
        - "T1110.001"   # Password Guessing
        - "T1110.003"   # Password Spraying
        - "T1110.004"   # Credential Stuffing
        - "T1078"       # Valid Accounts
        - "T1539"       # Steal Web Session Cookie
        - "T1550.001"   # Application Access Token
        - "T1606"       # Forge Web Credentials
      context: "credential breach - {{ incident_id }}"
    description: >
      Map observed credential-based attack TTPs to MITRE ATT&CK for
      structured reporting and detection rule creation.

  - id: remediation_plan
    tool: remediation_plan
    args:
      limit_per_tier: 10
    description: >
      Risk-prioritized remediation plan. Pay special attention to auth-related
      findings — MFA gaps, password policy findings, and exposed auth endpoints.

  - id: ir_report
    tool: generate_report
    args:
      template: credential_breach_ir
      incident_id: "{{ incident_id }}"
      compromised_usernames: "{{ compromised_usernames }}"
      source_ips: "{{ source_ips }}"
      affected_services: "{{ affected_services }}"
      findings: "{{ steps }}"
      format: pdf
    description: >
      Credential breach report: scope of compromise, attacker IP attribution,
      affected accounts and services, session revocation checklist,
      and MFA/hardening recommendations.
