name: Release

# Triggered when a maintainer pushes a vX.Y.Z tag to main.
# Creates an immutable GitHub Release with the corresponding CHANGELOG section.
#
# Release process:
#   1. Bump ODYSSEUS_RED_VERSION in src/constants.py on dev.
#   2. Move [Unreleased] → [X.Y.Z] in CHANGELOG.md on dev.
#   3. Open a PR from dev → main; wait for CI (ci-security.yml) to pass.
#   4. Merge the PR.
#   5. On main: git tag -a vX.Y.Z -m "Odysseus Red vX.Y.Z"
#   6. git push origin vX.Y.Z  ← triggers this workflow.

on:
  push:
    tags:
      - 'v[0-9]*'

# contents:write is required to create a GitHub Release.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  # Never cancel a release in progress — partial releases are worse than slow ones.
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Parse tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # A version starting with 0. is a pre-1.0 release — mark it pre-release
          # on GitHub so it does not appear as "latest" for users on main.
          if [[ "${VERSION}" == 0.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract CHANGELOG section
        id: notes
        run: |
          python3 - <<'PYEOF'
          import re, pathlib, os

          content = pathlib.Path("CHANGELOG.md").read_text()
          version = os.environ["VERSION"]

          # Match from "## [VERSION]..." to the next "## " heading (exclusive).
          pattern = rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## |\Z)'
          m = re.search(pattern, content, re.DOTALL)
          if m:
              notes = m.group(1).strip()
          else:
              notes = (
                  f"Release v{version} of Odysseus Red — the security overlay fork of Odysseus.\n\n"
                  f"See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) "
                  f"for full details."
              )

          pathlib.Path("/tmp/release_notes.txt").write_text(notes)
          print(f"Extracted {len(notes)} characters of release notes for v{version}")
          PYEOF
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Verify CHANGELOG section found
        run: |
          if [ ! -s /tmp/release_notes.txt ]; then
            echo "::error::release_notes.txt is empty — check that CHANGELOG.md has a [$(cat /tmp/release_notes.txt)] section"
            exit 1
          fi
          echo "Release notes preview (first 20 lines):"
          head -20 /tmp/release_notes.txt

      - name: Create GitHub Release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          PRERELEASE: ${{ steps.ver.outputs.prerelease }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.TAG;
            const version = process.env.VERSION;
            const isPrerelease = process.env.PRERELEASE === 'true';
            const notes = fs.readFileSync('/tmp/release_notes.txt', 'utf8');

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Odysseus Red ${tag}`,
              body: [
                notes,
                '',
                '---',
                '',
                '> **Authorization requirement:** All active tools require explicit written',
                '> authorization for any target. See [SECURITY.md](SECURITY.md).',
                '',
                `**Upstream base:** Odysseus \`1.0.1\`  `,
                `**Full Changelog:** https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md`,
              ].join('\n'),
              draft: false,
              prerelease: isPrerelease,
              make_latest: !isPrerelease ? 'true' : 'false',
            });

            core.info(`Release created: ${release.html_url}`);
            core.setOutput('release_url', release.html_url);
