name: Release Drafter

# Auto-drafts the next GitHub Release by categorising merged PRs since the
# last release tag. The draft is updated whenever a PR is opened/synced
# (for accurate next-version preview) or when a commit lands on main (final
# update before tagging). Maintainers review and promote the draft to a
# release after pushing a vX.Y.Z tag — the separate release.yml then
# publishes the real release.

on:
  push:
    branches:
      - main
    # Ignore doc-only and template changes — they do not affect the release.
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    types: [opened, reopened, synchronize]

# Default-deny; the single job opts in to the minimum scopes needed.
permissions: {}

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-draft:
    name: Update release draft
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create / update the draft release
      pull-requests: read   # read PR metadata for categorisation
    steps:
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e  # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
