name: CI (odysseus-red)

on:
  workflow_dispatch: {}
  push:
    branches: [dev, main]
    paths:
      - ".github/workflows/ci-security.yml"
      - "mcp_servers/**"
      - "modules/**"
      - "skills/**"
      - "tests/mcp_servers/**"
      - "tests/integration/**"
      - "docker/toolchain/**"
      - "docker-compose.security.yml"
      - "requirements.txt"
  pull_request:
    paths:
      - ".github/workflows/ci-security.yml"
      - "mcp_servers/**"
      - "modules/**"
      - "skills/**"
      - "docker/toolchain/**"
      - "requirements.txt"

permissions:
  contents: read

concurrency:
  group: ci-red-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Security lint (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: pip install bandit[toml]
      - run: |
          bandit -r \
            mcp_servers/common.py \
            mcp_servers/recon_server.py \
            mcp_servers/osint_server.py \
            mcp_servers/web_vuln_server.py \
            mcp_servers/intel_server.py \
            mcp_servers/hashcrack_server.py \
            mcp_servers/spiderfoot_server.py \
            mcp_servers/pdf_server.py \
            mcp_servers/yara_server.py \
            mcp_servers/exploit_server.py \
            mcp_servers/transform_server.py \
            mcp_servers/asset_server.py \
            mcp_servers/attck_server.py \
            mcp_servers/risk_server.py \
            mcp_servers/findings_server.py \
            modules/ \
            -ll -f json -o bandit-report.json 2>/dev/null || \
          bandit -r \
            mcp_servers/common.py \
            mcp_servers/recon_server.py \
            mcp_servers/osint_server.py \
            mcp_servers/web_vuln_server.py \
            mcp_servers/intel_server.py \
            mcp_servers/hashcrack_server.py \
            mcp_servers/spiderfoot_server.py \
            mcp_servers/pdf_server.py \
            mcp_servers/yara_server.py \
            mcp_servers/exploit_server.py \
            mcp_servers/transform_server.py \
            mcp_servers/asset_server.py \
            mcp_servers/attck_server.py \
            mcp_servers/risk_server.py \
            mcp_servers/findings_server.py \
            modules/ \
            -ll
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: Dependency vulnerability audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - name: Audit dependencies from requirements.txt
        run: |
          pip-audit -r requirements.txt \
            --output pip-audit-report.json \
            --format json \
            --ignore-vuln GHSA-r9dh-wcxw-q64v \
            2>/dev/null || pip-audit -r requirements.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  mcp-unit-tests:
    name: MCP server unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-asyncio
      - run: python -m pytest tests/mcp_servers/ -v --tb=short

  toolchain-build:
    name: Toolchain Dockerfile build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Build toolchain image
        run: docker build -t odysseus-toolchain:ci ./docker/toolchain/

  trivy-scan:
    name: Container vulnerability scan (trivy)
    runs-on: ubuntu-latest
    needs: toolchain-build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Rebuild toolchain image for scanning
        run: docker build -t odysseus-toolchain:ci ./docker/toolchain/
      - name: Install trivy
        run: |
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin latest
      - name: Scan image with trivy
        # exit-code 0 so unfixed vulns do not block CI — results are informational
        run: |
          trivy image \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0 \
            --output trivy-results.txt \
            odysseus-toolchain:ci || true
          cat trivy-results.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-results
          path: trivy-results.txt

  upstream-drift:
    name: Upstream sync drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: git fetch https://github.com/pewdiepie-archdaemon/odysseus.git dev
      - name: Report commits behind upstream
        run: |
          BEHIND=$(git rev-list --count HEAD..FETCH_HEAD)
          echo "Commits behind upstream/dev: $BEHIND"
          if [ "$BEHIND" -gt 50 ]; then
            echo "::warning::Fork is $BEHIND commits behind upstream — sync overdue"
          fi
